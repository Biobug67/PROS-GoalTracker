<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROS Performance Measures</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #ffffff;
  --bg2:     #f5f4f0;
  --bg3:     #eceae4;
  --text:    #1a1a18;
  --text2:   #6b6a65;
  --text3:   #9e9d98;
  --border:  rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.20);
  --radius:  10px;
  --rsm:     6px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:      #1c1c1a;
    --bg2:     #262624;
    --bg3:     #2f2f2c;
    --text:    #f0ede6;
    --text2:   #a09e98;
    --text3:   #6b6a65;
    --border:  rgba(255,255,255,0.10);
    --border2: rgba(255,255,255,0.20);
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg2);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.page { max-width: 920px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

header { margin-bottom: 1.5rem; }
header h1 { font-size: 22px; font-weight: 600; margin-bottom: 3px; }
header p  { font-size: 13px; color: var(--text2); }

.summary-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.summary-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--rsm); padding: 10px 14px; min-width: 100px; }
.sc-label { font-size: 11px; color: var(--text2); margin-bottom: 1px; }
.sc-num   { font-size: 22px; font-weight: 600; }

.progress-row  { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
.progress-bg   { flex: 1; height: 7px; border-radius: 4px; background: var(--bg3); overflow: hidden; }
.progress-fill { height: 100%; background: #4a8a1e; border-radius: 4px; transition: width .4s; }
.progress-lbl  { font-size: 12px; color: var(--text2); min-width: 75px; text-align: right; }

.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0.6rem; }
.fbtn { font-size: 12px; padding: 4px 13px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-family: inherit; transition: background .15s; }
.fbtn:hover  { background: var(--bg3); }
.fbtn.active { border: 1.5px solid var(--border2); background: var(--bg); font-weight: 500; }

.edit-hint { font-size: 11px; color: var(--text3); margin-bottom: 1rem; }

.category { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: .75rem; }
.cat-hdr  { display: flex; align-items: center; justify-content: space-between; padding: 11px 15px; background: var(--bg2); cursor: pointer; border: none; width: 100%; text-align: left; font-family: inherit; }
.cat-hdr:hover { background: var(--bg3); }
.cat-hdr-title { font-size: 13px; font-weight: 500; color: var(--text); }
.cat-hdr-meta  { font-size: 11px; color: var(--text2); }
.cat-body      { display: none; }
.cat-body.open { display: block; }

.item     { border-top: 0.5px solid var(--border); padding: 10px 15px; }
.item-top { display: flex; align-items: flex-start; gap: 12px; }
.item-left  { flex: 1; min-width: 0; }
.item-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }

.item-text {
  font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 2px;
  cursor: text; border-radius: 4px; padding: 1px 3px; margin-left: -3px; transition: background .15s;
}
.item-text:hover, .item-text:focus { background: var(--bg3); outline: none; }
.item-with {
  font-size: 11px; color: var(--text2); margin-bottom: 4px; min-height: 16px;
  cursor: text; border-radius: 4px; padding: 1px 3px; margin-left: -3px; transition: background .15s;
}
.item-with:hover, .item-with:focus { background: var(--bg3); outline: none; }

.badges-row   { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
.controls-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }

.badge     { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; white-space: nowrap; }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.b-not_started { background: var(--bg2); color: var(--text2); }
.b-not_started .badge-dot { background: var(--text3); }
.b-in_progress { background: #deeef9; color: #0a3d73; }
.b-in_progress .badge-dot { background: #2f7ecb; }
.b-on_hold     { background: #faeeda; color: #5c3306; }
.b-on_hold .badge-dot { background: #d48e14; }
.b-complete    { background: #e0f0d0; color: #254d0a; }
.b-complete .badge-dot { background: #4a8a1e; }
.b-high   { background: #faece7; color: #5e2410; }
.b-high .badge-dot   { background: #c44e24; }
.b-medium { background: #faeeda; color: #5c3306; }
.b-medium .badge-dot { background: #d48e14; }
.b-low    { background: #e1f5ee; color: #074536; }
.b-low .badge-dot    { background: #1a8c65; }
.b-overdue { display: inline-flex; align-items: center; font-size: 10px; font-weight: 500; color: #9a1f1f; background: #fce8e8; padding: 2px 7px; border-radius: 99px; }

.ctrl { font-family: inherit; font-size: 11px; padding: 3px 7px; border-radius: var(--rsm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); cursor: pointer; }
input[type="date"].ctrl { width: 130px; }

.note-toggle { background: none; border: none; font-size: 11px; color: var(--text2); cursor: pointer; font-family: inherit; padding: 1px 0; }
.note-toggle:hover { color: var(--text); }
.note-preview { font-size: 11px; color: var(--text2); font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 380px; }
.note-area      { display: none; margin-top: 6px; }
.note-area.open { display: block; }
.note-input { font-family: inherit; font-size: 12px; width: 100%; padding: 7px 9px; border-radius: var(--rsm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); resize: vertical; min-height: 58px; line-height: 1.5; }
.note-input:focus { outline: none; border-color: var(--text2); }

.add-task-btn { background: none; border: 0.5px dashed var(--border2); border-radius: var(--rsm); color: var(--text2); font-size: 12px; font-family: inherit; padding: 5px 12px; cursor: pointer; width: 100%; text-align: left; transition: background .15s, color .15s; }
.add-task-btn:hover { background: var(--bg3); color: var(--text); }
.delete-btn { background: none; border: none; color: var(--text3); font-size: 11px; font-family: inherit; cursor: pointer; padding: 2px 5px; border-radius: 4px; transition: color .15s, background .15s; }
.delete-btn:hover { color: #9a1f1f; background: #fce8e8; }

@media (max-width: 600px) {
  .item-top { flex-direction: column; gap: 8px; }
  .item-right { align-items: flex-start; width: 100%; }
  .controls-row, .badges-row { justify-content: flex-start; }
}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>PROS Performance Measures</h1>
    <p id="subtitle">Director + supervisor status tracker</p>
  </header>
  <div class="summary-row" id="summary-row"></div>
  <div class="progress-row">
    <div class="progress-bg"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
    <div class="progress-lbl" id="plbl">0% complete</div>
  </div>
  <div class="filters" id="sf"></div>
  <div class="filters" id="pf" style="margin-bottom:1.25rem"></div>
  <p class="edit-hint">Tip: click any task name or "with" line to edit it directly.</p>
  <div id="cats"></div>
</div>

<script>
var CATS = [
  { id:"standards", label:"Standards & asset management", items:[
    { id:"s1",  text:"Standards after reviews - define standards and actions", with:"Stephanie, Ben G" },
    { id:"s2",  text:"Extend Total Park Health to Total Facility Health concept", with:"Ben G, Ben W, Stephanie" },
    { id:"s3",  text:"Fixed asset process for Recreation", with:"Ben W, Ben G, Natalie" },
    { id:"s4",  text:"Fixed asset process for Open Space", with:"Danielle, Jim, Natalie" },
    { id:"s5",  text:"Fixed asset process for Ecosystem Management", with:"Danielle, Jim, Natalie" },
    { id:"s6",  text:"Fixed asset process for Golf", with:"Ben W, Jeff" },
    { id:"s7",  text:"Evaluate moving Field Maintenance back under Parks; ensure snow removal inclusion", with:"Ben W, Ben G" }
  ]},
  { id:"recreation", label:"Recreation, programs & revenue", items:[
    { id:"r1",  text:"Create path for Recreation to access PM support & higher planning priority", with:"Stephanie, Ben W, Jeff" },
    { id:"r2",  text:"Assess whether to replace RecTrac", with:"Jeff, Ben W, Becky Doyle" },
    { id:"r3",  text:"Identify revenue increase levers", with:"Jeff, Ben W" },
    { id:"r4",  text:"Pricing capacity: under/over-pricing review", with:"Jeff, Ben W" },
    { id:"r5",  text:"Longmont Cares: scholarship gap covered by other services", with:"Jeff, Ben W, Becky Doyle" },
    { id:"r6",  text:"Should scholarships expand to Adults & People with Disabilities?", with:"Jeff, Ben W" },
    { id:"r7",  text:"Plan to return Rec Center attendance to 500k/year", with:"Ben W" },
    { id:"r8",  text:"Expand Memorial Building daytime usage", with:"Ben W" },
    { id:"r9",  text:"Evaluate YMCA as community investment", with:"Jeff, Ben W" },
    { id:"r10", text:"Ensure funding to remain relevant OR stop lower-value activities", with:"Jeff, Ben W" },
    { id:"r11", text:"Define Recreation's role in large events", with:"Jeff, Ben W" },
    { id:"r12", text:"What replaces Rhythm at Roosevelt", with:"Jeff, Ben W" },
    { id:"r13", text:"Future of 4th of July", with:"Jeff, Ben W" },
    { id:"r14", text:"Festival location strategy", with:"Jeff, Ben W" }
  ]},
  { id:"funding", label:"Funding & staffing", items:[
    { id:"f1",  text:"Move eligible wages to General Fund", with:"Stephanie, Jeff" },
    { id:"f2",  text:"Propose election for ongoing PROS operations funding", with:"Jeff" },
    { id:"f3",  text:"Reduce temp staff costs; refocus on high-impact work", with:"Ben W, Jeff" },
    { id:"f4",  text:"Define how we know staff are working to capacity, efficiently & creatively", with:"" },
    { id:"f5",  text:"Assess ability to meet LDDA-funded needs", with:"" }
  ]},
  { id:"culture", label:"Culture, leadership & structure", items:[
    { id:"c1",  text:"Team culture: comms, accountability, appreciation, customer service, celebrate wins", with:"Jeff, Ben W, Ben G, All supervisors" },
    { id:"c2",  text:"Develop trust with Danielle & Jim", with:"Jeff" },
    { id:"c3",  text:"Help leadership see bigger City picture and fit", with:"Jeff" },
    { id:"c4",  text:"Define meeting structures: Parks, Rec, Open Space, CE; Direct Reports (indiv & joint)", with:"Jeff" },
    { id:"c5",  text:"PROS with Golf and Callahan House included", with:"Jeff, Ben W" },
    { id:"c6",  text:"Culture with Museum & Library (optionally Callahan House)", with:"Jeff, Ben W" },
    { id:"c7",  text:"Define Community Enrichment's role in Emergency Management", with:"Jeff, Ben W, Ben G" },
    { id:"c8",  text:"Meet with Deon", with:"Jeff, Ben W, Ben G" },
    { id:"c9",  text:"Select a Community Enrichment Lead", with:"Jeff, Ben W, Ben G" },
    { id:"c10", text:"Sheltering management & training", with:"Jeff, Ben W, Ben G" },
    { id:"c11", text:"Advocate to update the Parks, Recreation & Trails Master Plan", with:"Jeff, Ben W, Stephanie" }
  ]},
  { id:"community", label:"Community engagement & marketing", items:[
    { id:"e1",  text:"Challenge staff to be more engaged with community", with:"" },
    { id:"e2",  text:"Booths at events - continue & expand", with:"" },
    { id:"e3",  text:"Greater involvement: Chamber, Rotary, etc.", with:"" },
    { id:"e4",  text:"Greater presence in CPRAC?", with:"" },
    { id:"e5",  text:"PROS Marketing Plan", with:"" }
  ]}
];

var STATUSES = [
  { v:"not_started", label:"Not started" },
  { v:"in_progress", label:"In progress" },
  { v:"on_hold",     label:"On hold"     },
  { v:"complete",    label:"Complete"    }
];

var PRIORITIES = [
  { v:"",       label:"-- priority" },
  { v:"high",   label:"High"   },
  { v:"medium", label:"Medium" },
  { v:"low",    label:"Low"    }
];

var SK = "pros_v4_state";
var CK = "pros_v4_custom";
var state  = {};
var custom = {};
var sfilt  = "all";
var pfilt  = "all";
var catOpen = {};
CATS.forEach(function(c) { catOpen[c.id] = true; });

function loadState() {
  try { var r = localStorage.getItem(SK); if (r) state  = JSON.parse(r); } catch(e) {}
  try { var r = localStorage.getItem(CK); if (r) custom = JSON.parse(r); } catch(e) {}
}
function saveState()  { try { localStorage.setItem(SK, JSON.stringify(state));  } catch(e) {} }
function saveCustom() { try { localStorage.setItem(CK, JSON.stringify(custom)); } catch(e) {} }

function gd(id)     { return state[id] || {}; }
function gst(id)    { return gd(id).status     || "not_started"; }
function gpri(id)   { return gd(id).priority   || ""; }
function gdate(id)  { return gd(id).targetDate || ""; }
function gnotes(id) { return gd(id).notes      || ""; }
function gtxt(id, fb)  { return gd(id).customText  !== undefined ? gd(id).customText  : fb; }
function gwith(id, fb) { return gd(id).customWith  !== undefined ? gd(id).customWith  : fb; }

function setField(id, key, val) {
  if (!state[id]) state[id] = {};
  state[id][key] = val;
  saveState();
}

function catItems(cat) {
  var base  = cat.items.filter(function(i) { return !gd(i.id).hidden; });
  var extra = custom[cat.id] || [];
  return base.concat(extra);
}

function allItems() {
  var out = [];
  CATS.forEach(function(c) { catItems(c).forEach(function(i) { out.push(i); }); });
  return out;
}

function isOverdue(id) {
  var d = gdate(id);
  if (!d || gst(id) === "complete") return false;
  return new Date(d) < new Date(new Date().toDateString());
}

function esc(s) {
  return String(s || "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function mkBadge(cls, label) {
  return '<span class="badge ' + cls + '"><span class="badge-dot"></span>' + esc(label) + '</span>';
}

function render() {
  renderSummary();
  renderFilters();
  renderCats();
}

function renderSummary() {
  var items = allItems();
  var total = items.length;
  var counts = { not_started:0, in_progress:0, on_hold:0, complete:0 };
  items.forEach(function(i) { var s = gst(i.id); if (counts[s] !== undefined) counts[s]++; });
  var high    = items.filter(function(i) { return gpri(i.id) === "high"; }).length;
  var overdue = items.filter(function(i) { return isOverdue(i.id); }).length;
  var pct     = total ? Math.round(counts.complete / total * 100) : 0;

  document.getElementById("subtitle").textContent =
    "Director + supervisor status tracker  |  " + total + " items";

  var cards = [
    ["Complete",     counts.complete],
    ["In progress",  counts.in_progress],
    ["On hold",      counts.on_hold],
    ["High priority", high]
  ];
  if (overdue > 0) cards.push(["Overdue", overdue]);

  document.getElementById("summary-row").innerHTML = cards.map(function(c) {
    return '<div class="summary-card"><div class="sc-label">' + c[0] +
           '</div><div class="sc-num">' + c[1] + '</div></div>';
  }).join("");

  document.getElementById("pfill").style.width = pct + "%";
  document.getElementById("plbl").textContent  = pct + "% complete";
}

function renderFilters() {
  var items = allItems();
  var counts = { all: items.length, not_started:0, in_progress:0, on_hold:0, complete:0 };
  items.forEach(function(i) { var s = gst(i.id); if (counts[s] !== undefined) counts[s]++; });

  var slist = [{ v:"all", label:"All (" + counts.all + ")" }].concat(
    STATUSES.map(function(s) { return { v:s.v, label:s.label + " (" + counts[s.v] + ")" }; })
  );
  document.getElementById("sf").innerHTML = slist.map(function(o) {
    return '<button class="fbtn' + (sfilt === o.v ? " active" : "") +
           '" onclick="setSF(\'' + o.v + '\')">' + esc(o.label) + '</button>';
  }).join("");

  var plist = [{ v:"all", label:"All priorities" }].concat(
    PRIORITIES.filter(function(p) { return p.v; }).map(function(p) {
      return { v:p.v, label:p.label + " priority" };
    })
  );
  document.getElementById("pf").innerHTML = plist.map(function(o) {
    return '<button class="fbtn' + (pfilt === o.v ? " active" : "") +
           '" onclick="setPF(\'' + o.v + '\')">' + esc(o.label) + '</button>';
  }).join("");
}

function renderCats() {
  document.getElementById("cats").innerHTML = CATS.map(function(cat) {
    var items = catItems(cat);
    var visible = items.filter(function(i) {
      return (sfilt === "all" || gst(i.id) === sfilt) &&
             (pfilt === "all" || gpri(i.id) === pfilt);
    });
    if (!visible.length && (sfilt !== "all" || pfilt !== "all")) return "";

    var done   = items.filter(function(i) { return gst(i.id) === "complete"; }).length;
    var isOpen = catOpen[cat.id];

    var rows = visible.map(function(item) {
      var st    = gst(item.id);
      var pr    = gpri(item.id);
      var dt    = gdate(item.id);
      var notes = gnotes(item.id);
      var od    = isOverdue(item.id);
      var txt   = gtxt(item.id, item.text);
      var wth   = gwith(item.id, item.with);
      var slabel = "Not started";
      STATUSES.forEach(function(s) { if (s.v === st) slabel = s.label; });
      var plabel = "";
      PRIORITIES.forEach(function(p) { if (p.v === pr) plabel = p.label; });
      var nid = "note-" + item.id;

      var html = '<div class="item"><div class="item-top">';
      html += '<div class="item-left">';
      html += '<div class="item-text" id="txt-' + item.id + '" contenteditable="true" spellcheck="true"';
      html += ' title="Click to edit"';
      html += ' onblur="saveTxt(\'' + item.id + '\', \'customText\', this)"';
      html += ' onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}">';
      html += esc(txt) + '</div>';
      html += '<div class="item-with" contenteditable="true" spellcheck="false"';
      html += ' title="Click to edit names"';
      html += ' onblur="saveWith(\'' + item.id + '\', this)"';
      html += ' onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}">';
      html += (wth ? "with " + esc(wth) : "") + '</div>';
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px;">';
      html += '<button class="note-toggle" onclick="toggleNote(\'' + item.id + '\')">';
      html += (notes ? "show note" : "+ add note") + '</button>';
      if (notes) html += '<span class="note-preview">' + esc(notes) + '</span>';
      html += '</div>';
      html += '<div class="note-area' + (notes ? " open" : "") + '" id="' + nid + '">';
      html += '<textarea class="note-input" placeholder="Add a note..."';
      html += ' oninput="updateNote(\'' + item.id + '\', this.value)">';
      html += esc(notes) + '</textarea></div>';
      html += '</div>'; // item-left

      html += '<div class="item-right">';
      html += '<div class="badges-row">';
      html += mkBadge("b-" + st, slabel);
      if (pr) html += mkBadge("b-" + pr, plabel);
      if (od) html += '<span class="b-overdue">overdue</span>';
      html += '</div>';
      html += '<div class="controls-row">';
      html += '<select class="ctrl" onchange="setField(\'' + item.id + '\',\'status\',this.value);render();">';
      STATUSES.forEach(function(s) {
        html += '<option value="' + s.v + '"' + (st === s.v ? " selected" : "") + '>' + s.label + '</option>';
      });
      html += '</select>';
      html += '<select class="ctrl" onchange="setField(\'' + item.id + '\',\'priority\',this.value);render();">';
      PRIORITIES.forEach(function(p) {
        html += '<option value="' + p.v + '"' + (pr === p.v ? " selected" : "") + '>' + p.label + '</option>';
      });
      html += '</select>';
      html += '</div>'; // controls-row
      html += '<input type="date" class="ctrl" value="' + esc(dt) + '"';
      html += ' onchange="setField(\'' + item.id + '\',\'targetDate\',this.value);render();">';
      html += '<button class="delete-btn" onclick="deleteTask(\'' + item.id + '\',\'' + cat.id + '\')">Delete</button>';
      html += '</div>'; // item-right
      html += '</div></div>'; // item-top, item
      return html;
    }).join("");

    var html = '<div class="category">';
    html += '<button class="cat-hdr" onclick="toggleCat(\'' + cat.id + '\')">';
    html += '<span class="cat-hdr-title">' + esc(cat.label) + '</span>';
    html += '<span class="cat-hdr-meta">' + done + '/' + items.length + ' complete  ' + (isOpen ? '▲' : '▼') + '</span>';
    html += '</button>';
    html += '<div class="cat-body' + (isOpen ? " open" : "") + '" id="cb-' + cat.id + '">';
    html += rows;
    html += '<div style="padding:8px 15px;border-top:0.5px solid var(--border);">';
    html += '<button class="add-task-btn" onclick="addTask(\'' + cat.id + '\')">+ Add task</button>';
    html += '</div></div></div>';
    return html;
  }).join("");
}

function setSF(v) { sfilt = v; render(); }
function setPF(v) { pfilt = v; render(); }
function toggleCat(id) { catOpen[id] = !catOpen[id]; render(); }

function saveTxt(id, key, el) {
  setField(id, key, el.innerText.trim());
}

function saveWith(id, el) {
  var val = el.innerText.trim();
  if (val.toLowerCase().indexOf("with ") === 0) val = val.slice(5).trim();
  setField(id, "customWith", val);
  el.textContent = val ? "with " + val : "";
}

function toggleNote(id) {
  var area = document.getElementById("note-" + id);
  if (!area) return;
  var isOpen = area.className.indexOf("open") > -1;
  area.className = "note-area" + (isOpen ? "" : " open");
  var btn = area.previousElementSibling
    ? area.previousElementSibling.querySelector(".note-toggle") : null;
  if (!btn) {
    var parent = area.parentElement;
    if (parent) btn = parent.querySelector(".note-toggle");
  }
  if (btn) btn.textContent = isOpen ? "+ add note" : "hide note";
}

function updateNote(id, val) {
  setField(id, "notes", val);
  renderSummary();
}

function addTask(catId) {
  var newId = "custom_" + Date.now();
  if (!custom[catId]) custom[catId] = [];
  custom[catId].push({ id: newId, text: "New task - click to edit", with: "" });
  saveCustom();
  catOpen[catId] = true;
  render();
  setTimeout(function() {
    var el = document.getElementById("txt-" + newId);
    if (el) { el.focus(); document.execCommand("selectAll", false, null); }
  }, 60);
}

function deleteTask(id, catId) {
  var isCustom = id.indexOf("custom_") === 0;
  if (isCustom) {
    if (!confirm("Delete this task?")) return;
    custom[catId] = (custom[catId] || []).filter(function(t) { return t.id !== id; });
    saveCustom();
  } else {
    if (!confirm("Hide this task? It can be restored by contacting support.")) return;
    setField(id, "hidden", true);
  }
  render();
}

loadState();
render();
</script>
</body>
</html>
